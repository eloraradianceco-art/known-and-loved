  {q:"What's something small you're a little obsessive about?",v:null},
  {q:"Sweet or savory \u2014 pick a side and defend it?",v:null},
  {q:"What's a skill or hobby you wish you had more time for?",v:null},

const LEVELS=[
  {id:"icebreaker",label:"First Light",num:"01",tagline:"Let's start easy.",desc:"Hobbies, favorites, and the fun stuff first.",color:"#E08E6B",bg:"#130c08"},
  {id:"discover",label:"Discover",num:"02",tagline:"Who are you, really?",desc:"Light and curious. Get past the surface.",color:"#C9A84C",bg:"#12100a"},
  {id:"deepen",label:"Deepen",num:"03",tagline:"What do you actually believe?",desc:"Faith, values, and true compatibility.",color:"#8B5A8E",bg:"#0d0a12"},
  {id:"reveal",label:"Reveal",num:"04",tagline:"Let yourself be known.",desc:"Vulnerability, wounds, and what you're building toward.",color:"#A85050",bg:"#130909"},
  {id:"howwelove",label:"How We Love",num:"05",tagline:"Where did you learn to love?",desc:"Love styles, wounds, and childhood patterns.",color:"#B5647A",bg:"#120810"},

const PC="#7eb8d4",PBG="#070c10";

/* ── UI primitives ── */
function Shell({bg="#0a0907",glow=null,children}){
  const glowStyle=glow?{
    background:`radial-gradient(ellipse 100% 55% at 50% -10%, ${glow}12 0%, transparent 65%)`
  }:{
    background:"radial-gradient(ellipse 80% 40% at 50% -5%, rgba(201,168,76,0.06) 0%, transparent 60%)"
  };
  return(
    <div style={{minHeight:"100vh",background:bg,transition:"background 1s ease",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"28px 16px",fontFamily:"Cormorant Garant,Georgia,serif",position:"relative",overflow:"hidden"}}>
      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,...glowStyle}}/>
      <div style={{position:"fixed",bottom:0,left:0,right:0,height:"40%",pointerEvents:"none",zIndex:0,background:"linear-gradient(to top, rgba(0,0,0,0.4) 0%, transparent 100%)"}}/>
      <div style={{position:"relative",zIndex:1,width:"100%",display:"flex",flexDirection:"column",alignItems:"center"}}>{children}</div>
    </div>
  );
}
const OL=({c="#C9A84C",children})=><div style={{fontSize:10,letterSpacing:".35em",color:c,textTransform:"uppercase",marginBottom:16,fontFamily:"DM Sans,sans-serif",fontWeight:500,opacity:.8}}>{children}</div>;
const BB=({go,label="← Back"})=><button onClick={go} style={{background:"none",border:"none",color:"#7a7060",cursor:"pointer",fontSize:10,letterSpacing:".2em",textTransform:"uppercase",fontFamily:"DM Sans,sans-serif",fontWeight:500,padding:0,marginBottom:32,transition:"color .2s"}} onMouseOver={e=>e.currentTarget.style.color="#b0a090"} onMouseOut={e=>e.currentTarget.style.color="#7a7060"}>{label}</button>;
const PB=({go,children,off,style:s={}})=><button onClick={go} disabled={off} style={{border:"none",borderRadius:3,cursor:off?"not-allowed":"pointer",fontFamily:"DM Sans,sans-serif",fontWeight:600,letterSpacing:".12em",textTransform:"uppercase",transition:"all .25s",padding:"15px 38px",fontSize:12,...s}} onMouseOver={e=>{if(!off){e.currentTarget.style.opacity=".88";e.currentTarget.style.transform="translateY(-1px)"}}} onMouseOut={e=>{e.currentTarget.style.opacity="1";e.currentTarget.style.transform="translateY(0)"}}>{children}</button>;
const GB=({go,children,style:s={}})=><button onClick={go} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:3,color:"#8a8070",padding:"13px 28px",fontSize:11,fontWeight:600,letterSpacing:".15em",textTransform:"uppercase",cursor:"pointer",fontFamily:"DM Sans,sans-serif",transition:"all .25s",...s}} onMouseOver={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.18)";e.currentTarget.style.color="#c8b89a";e.currentTarget.style.background="rgba(255,255,255,0.04)"}} onMouseOut={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.08)";e.currentTarget.style.color="#8a8070";e.currentTarget.style.background="rgba(255,255,255,0.02)"}}>{children}</button>;
const Inp=({val,set,ph,style:s={}})=><input value={val} onChange={e=>set(e.target.value)} placeholder={ph} style={{display:"block",width:"100%",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:3,padding:"15px 18px",color:"#F5EFE4",fontSize:15,outline:"none",boxSizing:"border-box",fontFamily:"Cormorant Garant,Georgia,serif",transition:"border-color .2s",...s}} onFocus={e=>e.currentTarget.style.borderColor="rgba(255,255,255,0.18)"} onBlur={e=>e.currentTarget.style.borderColor="rgba(255,255,255,0.07)"}/>;

function Toast({msg}){return msg?<div style={{position:"fixed",top:28,left:"50%",transform:"translateX(-50%)",background:"rgba(20,16,12,0.92)",backdropFilter:"blur(20px)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:40,padding:"10px 24px",color:"#d4c8b0",fontSize:11,fontFamily:"DM Sans,sans-serif",fontWeight:500,letterSpacing:".06em",zIndex:99,whiteSpace:"nowrap",animation:"fadeUp .25s ease",boxShadow:"0 20px 60px rgba(0,0,0,0.5)"}}>{msg}</div>:null;}

/* ── Card renderer ── */
function CardFace({card,color}){
  if(!card)return null;
  if(card.type==="wound")return(
    <div style={{animation:"fadeUp .35s",width:"100%"}}>
      <div style={{fontSize:"clamp(1.5rem,5vw,1.9rem)",color,fontWeight:400,marginBottom:8}}>{card.word}</div>
      <div style={{color:"#9a8f82",fontSize:12,fontFamily:"sans-serif",lineHeight:1.6,marginBottom:18,fontStyle:"italic"}}>{card.def}</div>
      <div style={{height:1,background:`${color}25`,marginBottom:18}}/>
      <p style={{color:"#EDE8DF",fontSize:"clamp(1rem,3vw,1.12rem)",lineHeight:1.75,margin:0,fontStyle:"italic",fontWeight:300}}>{card.q}</p>
      {card.v&&<p style={{color,fontSize:11,marginTop:20,opacity:.55,fontFamily:"DM Sans,sans-serif",lineHeight:1.7,letterSpacing:".04em"}}>{card.v}</p>}
    </div>
  );
  if(card.type==="style")return(
    <div style={{animation:"fadeUp .35s",width:"100%"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",marginBottom:10}}>
        <span style={{background:`${SC[card.style]}22`,border:`1px solid ${SC[card.style]}55`,borderRadius:20,padding:"4px 14px",fontSize:12,color:SC[card.style],fontFamily:"sans-serif",fontWeight:700,letterSpacing:".1em",textTransform:"uppercase"}}>{card.style}</span>
      </div>
      <div style={{color:"#9a8f82",fontSize:12,fontFamily:"sans-serif",lineHeight:1.65,marginBottom:18,fontStyle:"italic",textAlign:"center"}}>{card.desc}</div>
      <div style={{height:1,background:`${SC[card.style]}25`,marginBottom:18}}/>
      <p style={{color:"#EDE8DF",fontSize:"clamp(1rem,3vw,1.12rem)",lineHeight:1.75,margin:0,fontStyle:"italic",fontWeight:300}}>{card.q}</p>
      {card.v&&<p style={{color:SC[card.style],fontSize:11,marginTop:20,opacity:.55,fontFamily:"DM Sans,sans-serif",lineHeight:1.7,letterSpacing:".04em"}}>{card.v}</p>}
    </div>
  );
  return(
    <div style={{animation:"fadeUp .4s ease"}}>
      <p style={{color:"#EDE8DF",fontSize:"clamp(1.1rem,3.4vw,1.25rem)",lineHeight:1.75,margin:0,fontStyle:"italic",fontWeight:300,letterSpacing:".01em"}}>{card.q}</p>
      {card.v&&<p style={{color,fontSize:11,marginTop:26,opacity:.55,fontFamily:"DM Sans,sans-serif",fontWeight:400,lineHeight:1.7,letterSpacing:".04em"}}>{card.v}</p>}
    </div>
  );
}

/* ══════════════════════════════════
   APP
══════════════════════════════════ */
function App(){
  /* ── solo state ── */
  const[sc,setSc]=useState("home");
  const[mode,setMode]=useState("solo");
  const[names,setNames]=useState(["",""]);
  const[lid,setLid]=useState(null);
  const[pray,setPray]=useState(false);
  const[deck,setDeck]=useState([]);
  const[idx,setIdx]=useState(0);
  const[flip,setFlip]=useState(false);
  const[pt,setPt]=useState(0);
  const[turn,setTurn]=useState(0);
  const[exit,setExit]=useState(false);
  const[favs,setFavs]=useState(()=>lsGet("kl_favs",[]));
  const[enote,setEnote]=useState(null);
  const[toast,setToast]=useState("");

  /* ── live session state ── */
  const[sid,setSid]=useState(null);
  const[code,setCode]=useState("");
  const[host,setHost]=useState(false);
  const[myNm,setMyNm]=useState("");
  const[pNm,setPNm]=useState("");
  const[lIdx,setLIdx]=useState(0);
  const[lRev,setLRev]=useState(false);
  const[lDeck,setLDeck]=useState([]);
  const[lLid,setLLid]=useState("discover");
  const[myAns,setMyAns]=useState("");
  const[pAns,setPAns]=useState("");
  const[allAns,setAllAns]=useState([]);
  const[sessions,setSessions]=useState(()=>lsGet("kl_sess",[]));
  const[vSess,setVSess]=useState(null);
  const[jCode,setJCode]=useState("");
  const[cName,setCName]=useState("");
  const[jName,setJName]=useState("");
  const[cLvl,setCLvl]=useState("discover");
  const[busy,setBusy]=useState(false);
  const[sErr,setSErr]=useState("");
  const[pOn,setPOn]=useState(false);

  const saveT=useRef(null);
  const sRef=useRef(null);
  const aRef=useRef(null);

  const shToast=m=>{setToast(m);setTimeout(()=>setToast(""),2500)};

  /* ── Supabase subscriptions ── */
  useEffect(()=>{
    if(!sid)return;
    sRef.current=SB.channel("s-"+sid)
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"sessions",filter:`id=eq.${sid}`},({new:s})=>{
        if(s.guest_name&&host)setPNm(s.guest_name);
        if(s.guest_name)setPOn(true);
        setLIdx(s.current_idx);
        setLRev(s.revealed);
        if(s.status==="active"&&sc==="waiting")setSc("live");
        if(s.status==="complete"){fetchAns(sid);setSc("lend");}
      })
      .subscribe();
    aRef.current=SB.channel("a-"+sid)
      .on("postgres_changes",{event:"*",schema:"public",table:"answers",filter:`session_id=eq.${sid}`},({new:a})=>{
        if((host&&!a.is_host)||(!host&&a.is_host))setPAns(a.answer||"");
        setAllAns(p=>{const i=p.findIndex(x=>x.card_idx===a.card_idx&&x.is_host===a.is_host);if(i>=0){const n=[...p];n[i]=a;return n;}return[...p,a];});
      })
      .subscribe();
    return()=>{
      if(sRef.current)SB.removeChannel(sRef.current);
      if(aRef.current)SB.removeChannel(aRef.current);
    };
  },[sid]);

  /* debounced answer save */
  useEffect(()=>{
    if(!sid)return;
    if(saveT.current)clearTimeout(saveT.current);
    saveT.current=setTimeout(async()=>{
      const c=lDeck[lIdx];if(!c)return;
      await SB.from("answers").upsert({session_id:sid,card_idx:lIdx,card_question:c.q,is_host:host,player_name:myNm,answer:myAns,updated_at:new Date().toISOString()},{onConflict:"session_id,card_idx,is_host"});
    },800);
    return()=>{if(saveT.current)clearTimeout(saveT.current)};
  },[myAns]);

  /* load answers when card changes */
  useEffect(()=>{
    if(!sid)return;
    setMyAns("");setPAns("");
    SB.from("answers").select("*").eq("session_id",sid).eq("card_idx",lIdx).then(({data})=>{
      if(!data)return;
      data.forEach(a=>{if(a.is_host===host)setMyAns(a.answer||"");else setPAns(a.answer||"");});
    });
  },[lIdx,sid]);

  const fetchAns=async(s)=>{const{data}=await SB.from("answers").select("*").eq("session_id",s).order("card_idx");if(data)setAllAns(data);};

  /* ── session actions ── */
  const createSess=async()=>{
    if(!SB){setSErr("Live sessions need an internet connection right now.");return;}
    setBusy(true);setSErr("");
    try{
      const c=genCode();
      const{data,error}=await SB.from("sessions").insert({room_code:c,level_id:cLvl,current_idx:0,revealed:false,host_name:cName||"Anthony",status:"waiting"}).select().single();
      if(error)throw error;
      setSid(data.id);setCode(c);setHost(true);setMyNm(cName||"Anthony");
      setLLid(cLvl);setLDeck(seeded(CARDS[cLvl],c));setLIdx(0);setLRev(false);setSc("waiting");
    }catch(e){setSErr("Could not create. Try again.");}
    setBusy(false);
  };

  const joinSess=async()=>{
    if(!SB){setSErr("Live sessions need an internet connection right now.");return;}
    setBusy(true);setSErr("");
    const c=jCode.toUpperCase().trim();
    try{
      const{data:sess,error:fe}=await SB.from("sessions").select("*").eq("room_code",c).eq("status","waiting").single();
      if(fe||!sess)throw new Error("Session not found. Check the code.");
      const{data,error}=await SB.from("sessions").update({guest_name:jName||"Guest",status:"active"}).eq("id",sess.id).select().single();
      if(error)throw error;
      setSid(data.id);setCode(c);setHost(false);setMyNm(jName||"Guest");setPNm(data.host_name);
      setLLid(data.level_id);setLDeck(seeded(CARDS[data.level_id],c));
      setLIdx(data.current_idx);setLRev(data.revealed);setPOn(true);setSc("live");
    }catch(e){setSErr(e.message||"Could not join.");}
    setBusy(false);
  };

  const revCard=async()=>{if(!host)return;await SB.from("sessions").update({revealed:true}).eq("id",sid);setLRev(true);};

  const nextLC=async()=>{
    if(!host)return;
    const ni=lIdx+1;
    if(ni>=lDeck.length){await endSess();return;}
    await SB.from("sessions").update({current_idx:ni,revealed:false}).eq("id",sid);
    setLIdx(ni);setLRev(false);
  };

  const endSess=async()=>{
    await SB.from("sessions").update({status:"complete"}).eq("id",sid);
    await fetchAns(sid);setSc("lend");
  };

  const saveArch=()=>{
    const lv=LEVELS.find(l=>l.id===lLid);
    const e={id:sid,code,partner:pNm,level:lLid,levelLabel:lv?.label,date:new Date().toLocaleDateString(),answers:allAns};
    const up=[e,...sessions.filter(s=>s.id!==sid)];
    setSessions(up);lsSet("kl_sess",up);shToast("Session saved ✓");
  };

  const copySess=()=>{
    const pairs=lDeck.slice(0,lIdx+1).map((_,i)=>{
      const my=allAns.find(a=>a.card_idx===i&&a.is_host===host);
      const th=allAns.find(a=>a.card_idx===i&&a.is_host!==host);
      if(!my&&!th)return null;
      return `Q: ${lDeck[i]?.q||""}\n${myNm}: ${my?.answer||"—"}\n${pNm||"Partner"}: ${th?.answer||"—"}`;
    }).filter(Boolean).join("\n\n");
    try{navigator.clipboard.writeText(`Known & Loved\nWith: ${pNm} · ${new Date().toLocaleDateString()}\n\n${pairs}`);shToast("Copied ✓")}catch{shToast("Copy failed")};
  };

  /* ── solo helpers ── */
  const isFav=c=>c&&favs.some(f=>f.q===c.q);
  const togFav=c=>{const n=isFav(c)?favs.filter(f=>f.q!==c.q):[...favs,{...c,levelId:pray?"wild":lid,note:""}];setFavs(n);lsSet("kl_favs",n)};
  const updNote=(i,note)=>{const n=favs.map((f,j)=>j===i?{...f,note}:f);setFavs(n);lsSet("kl_favs",n)};
  const startG=(l,p=false)=>{setLid(l);setPray(p);setDeck(shuffle(p?CARDS.wild:CARDS[l]));setIdx(0);setFlip(false);setTurn(0);setPt(0);setSc("game")};
  const nxt=()=>{if(idx>=deck.length-1){setSc("end");return;}setExit(true);setTimeout(()=>{setIdx(i=>i+1);setFlip(false);setTurn(0);setPt(0);setExit(false)},280)};
  const adv=()=>{const cp=mode==="couples"&&pray;if(cp){if(!flip)return;if(pt<2){setPt(t=>t+1);return;}if(pt===2){setPt(3);return;}nxt();}else if(mode==="couples"&&flip&&turn===0){setTurn(1);}else{nxt();}};
  const cAdv=(mode==="couples"&&pray)?(flip||pt>0):flip&&(mode==="solo"||turn>=1);
  const copyFavs=()=>{const t=favs.map((f,i)=>`${i+1}. [${f.levelId}]\n"${f.q}"${f.note?"\nNote: "+f.note:""}`).join("\n\n");try{navigator.clipboard.writeText(t);shToast("Copied ✓")}catch{shToast("Copy failed")}};

  const lv=LEVELS.find(l=>l.id===lid);
  const cd=deck[idx];
  const cc=pray?PC:(lv?.color||"#C9A84C");
  const cb=pray?PBG:(lv?.bg||"#0e0906");
  const cp=mode==="couples"&&pray;
  const lv2=LEVELS.find(l=>l.id===lLid);
  const lc2=lv2?.color||"#C9A84C";
  const lb2=lv2?.bg||"#0e0906";
  const lCard=lDeck[lIdx];
  const p1=names[0].trim()||"Person 1";
  const p2=names[1].trim()||"Person 2";

  /* ══ HOME ══ */
  if(sc==="home")return(
    <Shell glow="#C9A84C">
      <Toast msg={toast}/>
      <div style={{textAlign:"center",maxWidth:420,animation:"fadeUp .7s"}}>
        <OL>A Card Game for Christian Dating</OL>
        <h1 style={{fontSize:"clamp(2.8rem,8vw,4.2rem)",fontWeight:400,color:"#F5EFE4",lineHeight:1.1,margin:"0 0 10px"}}>Known<br/><em style={{color:"#C9A84C"}}>&amp; Loved</em></h1>
        <p style={{fontFamily:"sans-serif",fontSize:14,lineHeight:1.85,color:"#a89880",margin:"18px 0 28px"}}>Seven levels of conversation — from surface to soul.</p>
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap",marginBottom:10}}>
          <PB go={()=>{setMode("solo");setSc("levels")}} style={{background:"#C9A84C",color:"#0e0906"}}>Solo Play</PB>
          <PB go={()=>{setMode("couples");setSc("setup")}} style={{background:"transparent",border:"1px solid #4a3e32",color:"#C9A84C"}}>Couples</PB>
        </div>
        <button onClick={()=>setSc("shome")} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,margin:"8px auto 0",background:"rgba(107,142,196,.08)",border:"1px solid rgba(107,142,196,.3)",borderRadius:8,padding:"13px 28px",cursor:"pointer",color:"#6B8EC4",fontSize:12,fontFamily:"sans-serif",letterSpacing:".15em",textTransform:"uppercase",width:"100%",maxWidth:320,transition:"background .2s"}}
          onMouseOver={e=>e.currentTarget.style.background="rgba(107,142,196,.14)"}
          onMouseOut={e=>e.currentTarget.style.background="rgba(107,142,196,.08)"}
        >⬡ Live Session <span style={{fontSize:10,opacity:.6}}>· Real-time</span></button>
        <button onClick={()=>{setMode("solo");startG("wild",true)}} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,margin:"8px auto 0",background:"rgba(126,184,212,0.04)",border:"1px solid rgba(126,184,212,0.15)",borderRadius:3,padding:"11px 28px",cursor:"pointer",color:"#6ea8c4",fontSize:11,fontFamily:"DM Sans,sans-serif",fontWeight:500,letterSpacing:".18em",textTransform:"uppercase",width:"100%",maxWidth:320,transition:"all .25s"}}
          onMouseOver={e=>{e.currentTarget.style.background="rgba(126,184,212,0.08)";e.currentTarget.style.borderColor="rgba(126,184,212,0.3)"}}
          onMouseOut={e=>{e.currentTarget.style.background="rgba(126,184,212,0.04)";e.currentTarget.style.borderColor="rgba(126,184,212,0.15)"}}>
          <span style={{animation:"pulse 3s infinite"}}>✦</span> Prayer Mode
        </button>
        {favs.length>0&&<button onClick={()=>setSc("favs")} style={{background:"none",border:"none",color:"#9a8f82",fontSize:11,cursor:"pointer",marginTop:18,fontFamily:"sans-serif",letterSpacing:".15em",textTransform:"uppercase"}}>♥ {favs.length} Saved</button>}
        <div style={{marginTop:44,color:"#6a5e50",fontSize:12,fontStyle:"italic"}}>"Two are better than one." — Ecclesiastes 4:9</div>
      </div>
    </Shell>
  );

  /* ══ SESSION HOME ══ */
  if(sc==="shome")return(
    <Shell>
      <div style={{maxWidth:420,width:"100%",animation:"fadeUp .5s"}}>
        <BB go={()=>setSc("home")}/>
        <OL c="#6B8EC4">Live Session</OL>
        <h2 style={{color:"#F5EFE4",fontSize:26,fontWeight:400,margin:"0 0 8px",fontStyle:"italic"}}>Play together, remotely.</h2>
        <p style={{fontFamily:"sans-serif",fontSize:13,color:"#9a8f82",margin:"0 0 28px",lineHeight:1.75}}>You create a session and share the code. She joins on her phone. Same cards, same time — both of you answer and see each other's responses live.</p>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <PB go={()=>setSc("create")} style={{background:"#6B8EC4",color:"#0e0906",width:"100%"}}>Create a Session</PB>
          <GB go={()=>setSc("join")} style={{width:"100%",textAlign:"center"}}>Join with a Code</GB>
          {sessions.length>0&&<GB go={()=>setSc("mysess")} style={{width:"100%",textAlign:"center"}}>My Sessions ({sessions.length})</GB>}
        </div>
      </div>
    </Shell>
  );

  /* ══ CREATE SESSION ══ */
  if(sc==="create")return(
    <Shell>
      <div style={{maxWidth:420,width:"100%",animation:"fadeUp .5s"}}>
        <BB go={()=>setSc("shome")}/>
        <OL c="#6B8EC4">New Session</OL>
        <h2 style={{color:"#F5EFE4",fontSize:24,fontWeight:400,margin:"0 0 22px",fontStyle:"italic"}}>Set it up</h2>
        <label style={{color:"#9a8f82",fontSize:11,letterSpacing:".15em",textTransform:"uppercase",fontFamily:"sans-serif",display:"block",marginBottom:8}}>Your name</label>
        <Inp val={cName} set={setCName} ph="Anthony" style={{marginBottom:20}}/>
        <label style={{color:"#9a8f82",fontSize:11,letterSpacing:".15em",textTransform:"uppercase",fontFamily:"sans-serif",display:"block",marginBottom:12}}>Choose a level</label>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:22}}>
          {LEVELS.map(l=>(
            <button key={l.id} onClick={()=>setCLvl(l.id)} style={{display:"flex",alignItems:"center",gap:12,background:cLvl===l.id?`${l.color}18`:"rgba(255,255,255,.02)",border:`1px solid ${cLvl===l.id?l.color+"55":"rgba(255,255,255,.07)"}`,borderRadius:8,padding:"11px 14px",cursor:"pointer",textAlign:"left",transition:"all .2s"}}>
              <div style={{fontSize:13,color:l.color,minWidth:26,opacity:.8,fontStyle:"italic"}}>{l.num}</div>
              <div>
                <div style={{color:"#F5EFE4",fontSize:13,fontStyle:"italic"}}>{l.tagline}</div>
                <div style={{color:"#7a7060",fontSize:10,fontFamily:"sans-serif"}}>{l.label} · {CARDS[l.id]?.length||30} cards</div>
              </div>
            </button>
          ))}
        </div>
        {sErr&&<p style={{color:"#e8665a",fontSize:12,fontFamily:"sans-serif",marginBottom:12}}>{sErr}</p>}
        <PB go={createSess} off={busy} style={{background:"#6B8EC4",color:"#0e0906",width:"100%"}}>{busy?"Creating…":"Create Session"}</PB>
      </div>
    </Shell>
  );

  /* ══ WAITING ROOM ══ */
  if(sc==="waiting")return(
    <Shell bg="#080c14">
      <Toast msg={toast}/>
      <div style={{textAlign:"center",maxWidth:400,animation:"fadeUp .5s"}}>
        <OL c="#6B8EC4">Session Ready</OL>
        <p style={{fontFamily:"sans-serif",fontSize:13,color:"#9a8f82",marginBottom:24,lineHeight:1.7}}>Share this code. She enters it to join from the same URL.</p>
        <div style={{background:"rgba(107,142,196,.1)",border:"1px solid rgba(107,142,196,.3)",borderRadius:16,padding:"32px 40px",marginBottom:24}}>
          <div style={{fontSize:"clamp(2.5rem,10vw,3.5rem)",fontWeight:400,color:"#F5EFE4",letterSpacing:".2em",fontFamily:"sans-serif"}}>{code}</div>
          <div style={{color:"#6B8EC4",fontSize:11,letterSpacing:".2em",textTransform:"uppercase",fontFamily:"sans-serif",marginTop:12,animation:"blink 2s infinite"}}>Waiting for her to join…</div>
        </div>
        <p style={{fontFamily:"sans-serif",fontSize:12,color:"#7a6e60",marginBottom:24,lineHeight:1.7}}>She opens the same link → <strong style={{color:"#9a8f82"}}>Live Session → Join with a Code</strong></p>
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <PB go={()=>{navigator.clipboard.writeText(code);shToast("Code copied!")}} style={{background:"#6B8EC4",color:"#0e0906",padding:"13px 28px",fontSize:12}}>Copy Code</PB>
          <GB go={async()=>{await SB.from("sessions").update({status:"cancelled"}).eq("id",sid);setSc("shome")}}>Cancel</GB>
        </div>
      </div>
    </Shell>
  );

  /* ══ JOIN SESSION ══ */
  if(sc==="join")return(
    <Shell>
      <div style={{maxWidth:390,width:"100%",animation:"fadeUp .5s"}}>
        <BB go={()=>setSc("shome")}/>
        <OL c="#6B8EC4">Join a Session</OL>
        <h2 style={{color:"#F5EFE4",fontSize:24,fontWeight:400,margin:"0 0 22px",fontStyle:"italic"}}>Enter the code</h2>
        <label style={{color:"#9a8f82",fontSize:11,letterSpacing:".15em",textTransform:"uppercase",fontFamily:"sans-serif",display:"block",marginBottom:8}}>Room code</label>
        <Inp val={jCode} set={v=>setJCode(v.toUpperCase())} ph="ABC123" style={{marginBottom:16,fontSize:22,letterSpacing:".2em",textAlign:"center",fontFamily:"sans-serif"}}/>
        <label style={{color:"#9a8f82",fontSize:11,letterSpacing:".15em",textTransform:"uppercase",fontFamily:"sans-serif",display:"block",marginBottom:8}}>Your name</label>
        <Inp val={jName} set={setJName} ph="Your name" style={{marginBottom:18}}/>
        {sErr&&<p style={{color:"#e8665a",fontSize:12,fontFamily:"sans-serif",marginBottom:12}}>{sErr}</p>}
        <PB go={joinSess} off={busy||jCode.length<4} style={{background:"#6B8EC4",color:"#0e0906",width:"100%"}}>{busy?"Joining…":"Join Session"}</PB>
      </div>
    </Shell>
  );

  /* ══ LIVE GAME ══ */
  if(sc==="live"&&lCard)return(
    <Shell bg={lb2} glow={lc2}>
      <Toast msg={toast}/>
      <div style={{maxWidth:480,width:"100%",display:"flex",flexDirection:"column",alignItems:"center"}}>
        {/* header */}
        <div style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <div style={{color:"#9a8f82",fontSize:10,letterSpacing:".12em",textTransform:"uppercase",fontFamily:"sans-serif"}}>{code}</div>
            <div style={{color:pOn?"#5A9E7A":"#7a6e60",fontSize:10,fontFamily:"sans-serif",marginTop:2}}>{pOn?`${pNm} is here`:"Waiting…"}</div>
          </div>
          <div style={{color:"#7a6e60",fontSize:11,fontFamily:"sans-serif"}}>{lIdx+1} / {lDeck.length}</div>
          <div style={{color:lc2,fontSize:10,letterSpacing:".12em",textTransform:"uppercase",fontFamily:"sans-serif",opacity:.85}}>{lv2?.label}</div>
        </div>
        {/* progress */}
        <div style={{width:"100%",height:1,background:"rgba(255,255,255,0.05)",borderRadius:1,marginBottom:22}}>
          <div style={{height:"100%",borderRadius:1,background:`linear-gradient(90deg, ${lc2}80, ${lc2})`,width:`${((lIdx+1)/lDeck.length)*100}%`,transition:"width .5s cubic-bezier(0.16,1,0.3,1)",boxShadow:`0 0 8px ${lc2}60`}}/>
        </div>
        {/* card */}
        <div onClick={()=>{if(host&&!lRev)revCard()}} style={{width:"100%",minHeight:200,background:lRev?`linear-gradient(160deg, rgba(255,255,255,0.025) 0%, rgba(255,255,255,0.01) 100%)`:"linear-gradient(160deg, rgba(255,255,255,0.035) 0%, rgba(255,255,255,0.015) 100%)",backdropFilter:"blur(40px)",WebkitBackdropFilter:"blur(40px)",border:`1px solid ${lRev?lc2+"28":"rgba(255,255,255,0.07)"}`,borderTop:`1px solid ${lRev?lc2+"18":"rgba(255,255,255,0.12)"}`,borderRadius:2,padding:"30px 26px",cursor:host&&!lRev?"pointer":"default",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",textAlign:"center",boxShadow:lRev?`0 0 100px ${lc2}0c, 0 30px 70px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.06)`:"0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06)",transition:"all .5s cubic-bezier(0.16,1,0.3,1)",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:14,left:16,fontSize:9,color:lc2,opacity:.3,letterSpacing:".3em",fontFamily:"DM Sans,sans-serif",fontWeight:500,textTransform:"uppercase"}}>{lv2?.label}</div>
          {!lRev?(
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
              <div style={{fontSize:24,opacity:.2,color:lc2}}>✦</div>
              <div style={{color:"#9a8f82",fontSize:11,letterSpacing:".2em",textTransform:"uppercase",fontFamily:"sans-serif"}}>{host?"Tap to reveal":"Waiting for host…"}</div>
            </div>
          ):<CardFace card={lCard} color={lc2}/>}
        </div>
        {/* answers */}
        {lRev&&(
          <div style={{width:"100%",marginTop:14,display:"flex",flexDirection:"column",gap:10,animation:"fadeUp .4s"}}>
            <div style={{background:"rgba(255,255,255,.03)",border:`1px solid ${lc2}33`,borderRadius:10,padding:"13px 15px"}}>
              <div style={{color:lc2,fontSize:10,letterSpacing:".15em",textTransform:"uppercase",fontFamily:"sans-serif",marginBottom:7}}>{myNm} (you)</div>
              <textarea value={myAns} onChange={e=>setMyAns(e.target.value)} placeholder="Type your answer…" rows={3} style={{width:"100%",background:"transparent",border:"none",color:"#F5EFE4",fontSize:13,fontFamily:"Georgia,serif",lineHeight:1.6,outline:"none",fontStyle:myAns?"normal":"italic"}}/>
            </div>
            <div style={{background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.06)",borderRadius:10,padding:"13px 15px"}}>
              <div style={{color:"#9a8f82",fontSize:10,letterSpacing:".15em",textTransform:"uppercase",fontFamily:"sans-serif",marginBottom:7}}>{pNm||"Partner"}</div>
              <p style={{color:pAns?"#c8b89a":"#4a4035",fontSize:13,fontFamily:"Georgia,serif",lineHeight:1.6,margin:0,fontStyle:"italic",minHeight:20}}>{pAns||"Waiting for their answer…"}</p>
            </div>
          </div>
        )}
        {/* actions */}
        <div style={{display:"flex",gap:10,marginTop:14,width:"100%",justifyContent:"center",flexWrap:"wrap"}}>
          {host?(
            <>
              {lIdx<lDeck.length-1?(
                <PB go={nextLC} style={{background:lc2,color:"#0e0906",padding:"13px 28px",fontSize:12}}>Next Card</PB>
              ):(
                <PB go={endSess} style={{background:"#A85050",color:"#F5EFE4",padding:"13px 28px",fontSize:12}}>End Session</PB>
              )}
              <GB go={endSess} style={{fontSize:11,padding:"10px 16px"}}>End Early</GB>
            </>
          ):(
            <div style={{color:"#7a6e60",fontSize:12,fontFamily:"sans-serif",letterSpacing:".1em",textTransform:"uppercase",marginTop:8}}>
              {lRev?"Host controls navigation":"Waiting for host…"}
            </div>
          )}
        </div>
      </div>
    </Shell>
  );

  /* ══ LIVE END ══ */
  if(sc==="lend")return(
    <Shell>
      <Toast msg={toast}/>
      <div style={{maxWidth:520,width:"100%",animation:"fadeUp .6s"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:28,color:"#C9A84C",opacity:.45,marginBottom:12,animation:"pulse 3s infinite"}}>✦</div>
          <h2 style={{color:"#F5EFE4",fontSize:26,fontWeight:400,fontStyle:"italic",margin:"0 0 6px"}}>Session Complete</h2>
          <p style={{fontFamily:"sans-serif",fontSize:13,color:"#9a8f82"}}>With {pNm} · {lv2?.label}</p>
        </div>
        <div style={{maxHeight:"42vh",overflowY:"auto",marginBottom:18}}>
          {lDeck.slice(0,lIdx+1).map((_,i)=>{
            const my=allAns.find(a=>a.card_idx===i&&a.is_host===host);
            const th=allAns.find(a=>a.card_idx===i&&a.is_host!==host);
            if(!my&&!th)return null;
            return(
              <div key={i} style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:10,padding:"15px 16px",marginBottom:8}}>
                <p style={{color:"#c8b89a",fontSize:13,fontStyle:"italic",lineHeight:1.6,marginBottom:10}}>{lDeck[i]?.q}</p>
                {my?.answer&&<div style={{marginBottom:6}}><span style={{color:"#C9A84C",fontSize:10,fontFamily:"sans-serif",letterSpacing:".1em",textTransform:"uppercase"}}>{myNm}: </span><span style={{color:"#ede5d8",fontSize:13,fontFamily:"sans-serif"}}>{my.answer}</span></div>}
                {th?.answer&&<div><span style={{color:"#9a8f82",fontSize:10,fontFamily:"sans-serif",letterSpacing:".1em",textTransform:"uppercase"}}>{pNm}: </span><span style={{color:"#9a8f82",fontSize:13,fontFamily:"sans-serif"}}>{th.answer}</span></div>}
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center"}}>
          <PB go={saveArch} style={{background:"#C9A84C",color:"#0e0906",padding:"13px 22px",fontSize:12}}>Save Session</PB>
          <GB go={copySess} style={{fontSize:12,padding:"11px 18px"}}>Copy All</GB>
          <GB go={()=>{setSc("shome");setSid(null)}} style={{fontSize:12,padding:"11px 18px"}}>Done</GB>
        </div>
      </div>
    </Shell>
  );

  /* ══ MY SESSIONS ══ */
  if(sc==="mysess")return(
    <Shell>
      <div style={{maxWidth:520,width:"100%",animation:"fadeUp .5s"}}>
        <BB go={()=>setSc("shome")}/>
        <OL c="#6B8EC4">My Sessions</OL>
        <h2 style={{color:"#F5EFE4",fontSize:26,fontWeight:400,margin:"0 0 22px",fontStyle:"italic"}}>{sessions.length} conversation{sessions.length!==1?"s":""}</h2>
        {sessions.map((s,i)=>(
          <button key={i} onClick={()=>{setVSess(s);setSc("sdetail")}} style={{display:"block",width:"100%",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:10,padding:"16px 18px",cursor:"pointer",textAlign:"left",marginBottom:8,transition:"all .2s"}}
            onMouseOver={e=>e.currentTarget.style.background="rgba(255,255,255,.06)"}
            onMouseOut={e=>e.currentTarget.style.background="rgba(255,255,255,.03)"}
          >
            <div style={{color:"#6B8EC4",fontSize:10,fontWeight:700,letterSpacing:".15em",textTransform:"uppercase",fontFamily:"sans-serif",marginBottom:4}}>{s.levelLabel||s.level} · {s.date}</div>
            <div style={{color:"#F5EFE4",fontSize:16,fontStyle:"italic",marginBottom:2}}>With {s.partner}</div>
            <div style={{color:"#7a7060",fontSize:12,fontFamily:"sans-serif"}}>{s.answers?.length||0} answers · {s.code}</div>
          </button>
        ))}
      </div>
    </Shell>
  );

  /* ══ SESSION DETAIL ══ */
  if(sc==="sdetail"&&vSess)return(
    <Shell>
      <div style={{maxWidth:520,width:"100%",animation:"fadeUp .5s"}}>
        <BB go={()=>setSc("mysess")}/>
        <OL c="#6B8EC4">{vSess.levelLabel} · {vSess.date}</OL>
        <h2 style={{color:"#F5EFE4",fontSize:24,fontWeight:400,margin:"0 0 20px",fontStyle:"italic"}}>With {vSess.partner}</h2>
        {Array.from(new Set((vSess.answers||[]).map(a=>a.card_idx))).sort((a,b)=>a-b).map(ci=>{
          const hA=vSess.answers.find(a=>a.card_idx===ci&&a.is_host);
          const gA=vSess.answers.find(a=>a.card_idx===ci&&!a.is_host);
          const q=(hA||gA)?.card_question||"";
          return(
            <div key={ci} style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:10,padding:"15px 16px",marginBottom:10}}>
              <p style={{color:"#c8b89a",fontSize:13,fontStyle:"italic",lineHeight:1.6,marginBottom:10}}>{q}</p>
              {hA?.answer&&<div style={{marginBottom:6}}><span style={{color:"#C9A84C",fontSize:10,fontFamily:"sans-serif",letterSpacing:".1em",textTransform:"uppercase"}}>{hA.player_name}: </span><span style={{color:"#ede5d8",fontSize:13,fontFamily:"sans-serif"}}>{hA.answer}</span></div>}
              {gA?.answer&&<div><span style={{color:"#9a8f82",fontSize:10,fontFamily:"sans-serif",letterSpacing:".1em",textTransform:"uppercase"}}>{gA.player_name}: </span><span style={{color:"#9a8f82",fontSize:13,fontFamily:"sans-serif"}}>{gA.answer}</span></div>}
            </div>
          );
        })}
        <GB go={()=>{const u=sessions.filter(s=>s.id!==vSess.id);setSessions(u);lsSet("kl_sess",u);setSc("mysess")}} style={{marginTop:8,color:"#e8665a",borderColor:"#e8665a44"}}>Delete Session</GB>
      </div>
    </Shell>
  );

  /* ══ SOLO SETUP ══ */
  if(sc==="setup")return(
    <Shell>
      <div style={{maxWidth:390,width:"100%",animation:"fadeUp .5s"}}>
        <BB go={()=>setSc("home")}/>
        <OL>Couples Mode</OL>
        <h2 style={{color:"#F5EFE4",fontSize:26,fontWeight:400,margin:"0 0 8px",fontStyle:"italic"}}>Enter your names</h2>
        <p style={{fontFamily:"sans-serif",fontSize:13,color:"#9a8f82",margin:"0 0 24px",lineHeight:1.7}}>Optional — makes turns feel more personal.</p>
        {[0,1].map(i=><Inp key={i} val={names[i]} set={v=>{const n=[...names];n[i]=v;setNames(n)}} ph={`Person ${i+1}`} style={{marginBottom:12}}/>)}
        <PB go={()=>setSc("levels")} style={{background:"#C9A84C",color:"#0e0906",width:"100%",marginTop:8}}>Continue</PB>
        <button onClick={()=>startG("wild",true)} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,margin:"10px auto 0",width:"100%",background:"rgba(126,184,212,.06)",border:"1px solid rgba(126,184,212,.18)",borderRadius:6,padding:"12px",cursor:"pointer",color:PC,fontSize:12,fontFamily:"sans-serif",letterSpacing:".13em",textTransform:"uppercase",boxSizing:"border-box"}}>✦ Couples Prayer Mode</button>
      </div>
    </Shell>
  );

  /* ══ LEVELS ══ */
  if(sc==="levels")return(
    <Shell>
      <div style={{maxWidth:500,width:"100%",animation:"fadeUp .5s"}}>
        <BB go={()=>setSc(mode==="couples"?"setup":"home")}/>
        <OL>Choose a level</OL>
        <h2 style={{color:"#EDE8DF",fontSize:30,fontWeight:300,margin:"0 0 24px",letterSpacing:"-.01em"}}>Where do you want to begin?</h2>
        {LEVELS.map((l,i)=>(
          <button key={l.id} onClick={()=>startG(l.id)} style={{display:"flex",alignItems:"center",gap:18,width:"100%",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.08)",borderRadius:10,padding:"17px 18px",cursor:"pointer",textAlign:"left",marginBottom:8,transition:"all .2s",animation:`fadeUp .4s ease ${i*.06}s both`}}
            onMouseOver={e=>{e.currentTarget.style.background="rgba(255,255,255,.07)";e.currentTarget.style.borderColor=l.color+"55"}}
            onMouseOut={e=>{e.currentTarget.style.background="rgba(255,255,255,.03)";e.currentTarget.style.borderColor="rgba(255,255,255,.08)"}}
          >
            <div style={{fontSize:17,color:l.color,fontStyle:"italic",minWidth:30,opacity:.75}}>{l.num}</div>
            <div>
              <div style={{color:l.color,fontSize:10,fontWeight:700,letterSpacing:".15em",textTransform:"uppercase",fontFamily:"sans-serif",marginBottom:3}}>{l.label} · {CARDS[l.id]?.length||30} cards</div>
              <div style={{color:"#F5EFE4",fontSize:14,fontStyle:"italic",marginBottom:2}}>{l.tagline}</div>
              <div style={{color:"#9a8f82",fontSize:12,fontFamily:"sans-serif",lineHeight:1.5}}>{l.desc}</div>
            </div>
          </button>
        ))}
        <button onClick={()=>startG("wild",true)} style={{display:"flex",alignItems:"center",gap:14,width:"100%",background:"rgba(126,184,212,.05)",border:"1px solid rgba(126,184,212,.18)",borderRadius:10,padding:"17px 18px",cursor:"pointer",textAlign:"left",marginTop:4}}
          onMouseOver={e=>e.currentTarget.style.background="rgba(126,184,212,.1)"}
          onMouseOut={e=>e.currentTarget.style.background="rgba(126,184,212,.05)"}
        >
          <div style={{fontSize:17,color:PC,minWidth:30,opacity:.75,animation:"pulse 3s infinite"}}>✦</div>
          <div>
            <div style={{color:PC,fontSize:10,fontWeight:700,letterSpacing:".15em",textTransform:"uppercase",fontFamily:"sans-serif",marginBottom:3}}>{mode==="couples"?"Couples ":""}Prayer Mode</div>
            <div style={{color:"#F5EFE4",fontSize:14,fontStyle:"italic",marginBottom:2}}>Pray together. Linger here.</div>
            <div style={{color:"#9a8f82",fontSize:12,fontFamily:"sans-serif",lineHeight:1.5}}>{mode==="couples"?"Each card is a prompt to pray aloud — one then the other.":"Scripture and cards designed to turn into prayer."}</div>
          </div>
        </button>
      </div>
    </Shell>
  );

  /* ══ SOLO GAME ══ */
  if(sc==="game"&&cd){
    const spo=cp&&pt>=1&&pt<=2;
    const pp=pt===1?p1:p2;
    return(
      <Shell bg={cb} glow={cc}>
        <Toast msg={toast}/>
        <div style={{maxWidth:440,width:"100%",display:"flex",flexDirection:"column",alignItems:"center"}}>
          <div style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <button onClick={()=>setSc("levels")} style={{background:"none",border:"none",color:"#9a8f82",cursor:"pointer",fontSize:11,letterSpacing:".15em",textTransform:"uppercase",fontFamily:"sans-serif",padding:0}}>← Levels</button>
            <div style={{color:"#5a5040",fontSize:11,fontFamily:"DM Sans,sans-serif",fontWeight:300,letterSpacing:".04em"}}>{idx+1} / {deck.length}</div>
            <div style={{fontSize:9,color:cc,letterSpacing:".25em",textTransform:"uppercase",fontFamily:"DM Sans,sans-serif",fontWeight:500,opacity:.7}}>{pray?(mode==="couples"?"Couples Prayer":"Prayer"):lv?.label}</div>
          </div>
          <div style={{width:"100%",height:1,background:"rgba(255,255,255,0.05)",borderRadius:1,marginBottom:28}}>
            <div style={{height:"100%",borderRadius:1,background:`linear-gradient(90deg, ${cc}80, ${cc})`,width:`${((idx+1)/deck.length)*100}%`,transition:"width .5s cubic-bezier(0.16,1,0.3,1)",boxShadow:`0 0 8px ${cc}60`}}/>
          </div>
          {mode==="couples"&&!pray&&flip&&<div style={{background:`${cc}18`,border:`1px solid ${cc}33`,borderRadius:20,padding:"6px 18px",marginBottom:14,fontSize:11,color:cc,letterSpacing:".12em",fontFamily:"sans-serif",fontWeight:700,textTransform:"uppercase",animation:"fadeUp .3s"}}>{turn===0?`${p1}'s turn`:`${p2}'s turn`}</div>}
          {pray&&<div style={{position:"fixed",top:"40%",left:"50%",transform:"translate(-50%,-50%)",width:400,height:400,borderRadius:"50%",background:`radial-gradient(circle,${PC}0c 0%,transparent 70%)`,pointerEvents:"none",animation:"pulse 4s infinite"}}/>}
          {spo&&(
            <div style={{position:"fixed",inset:0,zIndex:20,background:"rgba(7,12,16,.93)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,animation:"fadeIn .4s"}}>
              <div style={{position:"relative",width:90,height:90,marginBottom:32}}>
                {[0,1,2].map(i=><div key={i} style={{position:"absolute",inset:0,border:`1px solid ${PC}`,borderRadius:"50%",animation:`ripple 2.4s ease-out ${i*.8}s infinite`,opacity:0}}/>)}
                <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,color:PC,animation:"breathe 3s ease-in-out infinite"}}>✦</div>
              </div>
              <div style={{fontSize:11,color:PC,letterSpacing:".25em",textTransform:"uppercase",fontFamily:"sans-serif",marginBottom:14,opacity:.7}}>Praying aloud</div>
              <div style={{fontSize:"clamp(1.5rem,6vw,2rem)",color:"#F5EFE4",fontStyle:"italic",marginBottom:12,textAlign:"center"}}>{pp}</div>
              <p style={{color:"#9a8f82",fontSize:13,fontFamily:"sans-serif",lineHeight:1.75,textAlign:"center",maxWidth:300,margin:"0 0 40px"}}>{pt===1?`${p1}, take a moment to pray aloud.`:`${p2}, pray aloud — whatever the Spirit puts on your heart.`}</p>
              <button onClick={adv} style={{background:PC,color:"#0e0906",border:"none",borderRadius:4,padding:"14px 40px",fontSize:13,fontWeight:700,letterSpacing:".15em",textTransform:"uppercase",cursor:"pointer",fontFamily:"sans-serif"}}>Amen {pt===1?`· ${p2}'s Turn →`:"· Next Card →"}</button>
            </div>
          )}
          <div onClick={()=>!flip&&setFlip(true)} style={{width:"100%",minHeight:(cd.type==="wound"||cd.type==="style")&&flip?320:280,background:flip?`linear-gradient(160deg, rgba(255,255,255,0.025) 0%, rgba(255,255,255,0.01) 100%)`:"linear-gradient(160deg, rgba(255,255,255,0.035) 0%, rgba(255,255,255,0.015) 100%)",backdropFilter:"blur(40px)",WebkitBackdropFilter:"blur(40px)",border:`1px solid ${flip?cc+"30":"rgba(255,255,255,0.07)"}`,borderTop:`1px solid ${flip?cc+"20":"rgba(255,255,255,0.12)"}`,borderRadius:2,padding:"36px 30px",cursor:flip?"default":"pointer",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",textAlign:"center",boxShadow:flip?`0 0 120px ${cc}0d, 0 40px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06)`:"0 24px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06)",transition:"all .5s cubic-bezier(0.16,1,0.3,1)",transform:exit?"translateX(-24px) scale(0.98)":"translateX(0) scale(1)",opacity:exit?0:1,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:14,left:16,fontSize:9,color:cc,opacity:.35,letterSpacing:".3em",fontFamily:"DM Sans,sans-serif",fontWeight:500,textTransform:"uppercase"}}>{pray?"Prayer":cd.type==="wound"&&flip?"Wound Word":cd.type==="style"&&flip?"Attachment Style":lv?.label}</div>
            {flip&&<button onClick={e=>{e.stopPropagation();togFav(cd)}} style={{position:"absolute",top:9,right:13,background:"none",border:"none",cursor:"pointer",fontSize:20,color:isFav(cd)?"#e8665a":"#7a6e60",transition:"color .2s,transform .15s",transform:isFav(cd)?"scale(1.15)":"scale(1)"}}>♥</button>}
            {!flip?(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16}}><div style={{fontSize:26,opacity:.15,color:cc,animation:pray?"pulse 3s infinite":"none"}}>✦</div><div style={{color:"#5a5040",fontSize:10,letterSpacing:".3em",textTransform:"uppercase",fontFamily:"DM Sans,sans-serif",fontWeight:500}}>Tap to reveal</div></div>):<CardFace card={cd} color={cc}/>}
          </div>
          {!spo&&(
            <>
              <PB go={adv} off={!cAdv} style={{marginTop:20,background:cAdv?cc:"transparent",color:cAdv?"#0e0906":"#6a5e50",border:`1px solid ${cAdv?cc:"#4a3e32"}`,fontSize:12}}>
                {cp&&flip&&pt===0?"Begin Praying →":mode==="couples"&&!pray&&flip&&turn===0?`${p2}'s Turn →`:idx>=deck.length-1?"Finish":"Next Card"}
              </PB>
              <button onClick={nxt} style={{background:"none",border:"none",color:"#4a4030",fontSize:10,cursor:"pointer",marginTop:12,fontFamily:"DM Sans,sans-serif",fontWeight:400,letterSpacing:".2em",textTransform:"uppercase",transition:"color .2s"}} onMouseOver={e=>e.currentTarget.style.color="#7a7060"} onMouseOut={e=>e.currentTarget.style.color="#4a4030"}>Skip</button>
            </>
          )}
        </div>
      </Shell>
    );
  }

  /* ══ END ══ */
  if(sc==="end")return(
    <Shell>
      <div style={{textAlign:"center",maxWidth:380,animation:"fadeUp .6s"}}>
        <div style={{fontSize:30,marginBottom:18,opacity:.45,color:"#C9A84C",animation:"pulse 3s infinite"}}>✦</div>
        <h2 style={{color:"#F5EFE4",fontSize:30,fontWeight:400,margin:"0 0 14px",fontStyle:"italic"}}>Well done.</h2>
        <p style={{fontFamily:"sans-serif",fontSize:14,color:"#a89880",lineHeight:1.85,margin:"0 0 28px"}}>You showed up with honesty.<br/>That's not nothing — it's everything.</p>
        <div style={{color:"#C9A84C",fontSize:12,opacity:.75,marginBottom:32,fontStyle:"italic",lineHeight:1.9}}>"Love is patient, love is kind…<br/>it always hopes, always perseveres."<div style={{fontSize:10,opacity:.65,fontStyle:"normal",letterSpacing:".1em",fontFamily:"sans-serif",marginTop:5}}>— 1 Corinthians 13</div></div>
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap",marginBottom:10}}>
          <PB go={()=>startG(lid,pray)} style={{background:"#C9A84C",color:"#0e0906",padding:"13px 26px",fontSize:12}}>Play Again</PB>
          <GB go={()=>setSc("levels")}>New Level</GB>
          {favs.length>0&&<GB go={()=>setSc("favs")}>♥ Saved ({favs.length})</GB>}
        </div>
        <GB go={()=>{setSc("home");setMode("solo")}} style={{width:"100%",boxSizing:"border-box",marginTop:4}}>Home</GB>
      </div>
    </Shell>
  );

  /* ══ FAVORITES ══ */
  if(sc==="favs")return(
    <Shell>
      <Toast msg={toast}/>
      <div style={{maxWidth:520,width:"100%",animation:"fadeUp .5s"}}>
        <BB go={()=>setSc("home")}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22}}>
          <div><OL c="#e8665a">Saved Cards</OL><h2 style={{color:"#F5EFE4",fontSize:26,fontWeight:400,margin:0,fontStyle:"italic"}}>{favs.length===0?"Nothing saved yet.":`${favs.length} saved`}</h2></div>
          {favs.length>0&&<button onClick={copyFavs} style={{background:"rgba(201,168,76,.08)",border:"1px solid rgba(201,168,76,.3)",borderRadius:6,padding:"10px 16px",color:"#C9A84C",fontSize:11,fontWeight:700,letterSpacing:".12em",textTransform:"uppercase",cursor:"pointer",fontFamily:"sans-serif",whiteSpace:"nowrap",marginTop:14,flexShrink:0}}>Copy All</button>}
        </div>
        {favs.length===0&&<p style={{fontFamily:"sans-serif",fontSize:14,color:"#9a8f82",lineHeight:1.7}}>Tap ♥ on any revealed card to save it here.</p>}
        {favs.map((f,i)=>{
          const l=f.levelId==="wild"?null:LEVELS.find(x=>x.id===f.levelId);
          const col=l?l.color:PC;
          const ed=enote===i;
          return(
            <div key={i} style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.08)",borderRadius:10,padding:"18px 20px",marginBottom:10,position:"relative",animation:`fadeUp .3s ease ${i*.04}s both`}}>
              <div style={{fontSize:10,color:col,letterSpacing:".15em",textTransform:"uppercase",fontFamily:"sans-serif",marginBottom:7}}>{l?l.label:"Wild"}{f.word?" · Wound":""}{f.style?" · Attachment":""}</div>
              {f.word&&<div style={{fontSize:15,color:col,marginBottom:5}}>{f.word}</div>}
              {f.style&&<span style={{background:`${SC[f.style]}22`,border:`1px solid ${SC[f.style]}55`,borderRadius:20,padding:"3px 12px",fontSize:11,color:SC[f.style],fontFamily:"sans-serif",fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",display:"inline-block",marginBottom:9}}>{f.style}</span>}
              <p style={{color:"#ede5d8",fontSize:14,lineHeight:1.72,margin:0,fontStyle:"italic",paddingRight:30}}>{f.q}</p>
              {f.v&&<p style={{color:col,fontSize:11,marginTop:9,opacity:.6,fontFamily:"sans-serif",lineHeight:1.5}}>{f.v}</p>}
              <div style={{marginTop:12,borderTop:"1px solid rgba(255,255,255,.05)",paddingTop:10}}>
                {ed?(<div><textarea value={f.note||""} onChange={e=>updNote(i,e.target.value)} placeholder="Add a note…" rows={3} style={{width:"100%",background:"rgba(255,255,255,.05)",border:"1px solid #4a3e32",borderRadius:6,padding:"9px 11px",color:"#e0d8cc",fontSize:13,fontFamily:"sans-serif",lineHeight:1.6,outline:"none",boxSizing:"border-box"}} autoFocus/><button onClick={()=>setEnote(null)} style={{background:"none",border:"none",color:"#9a8f82",fontSize:11,cursor:"pointer",marginTop:5,fontFamily:"sans-serif",letterSpacing:".1em",textTransform:"uppercase"}}>Done</button></div>)
                :(<button onClick={()=>setEnote(i)} style={{background:"none",border:"none",padding:0,cursor:"pointer",textAlign:"left",width:"100%"}}>{f.note?<p style={{color:"#9a8f82",fontSize:13,fontFamily:"sans-serif",lineHeight:1.65,margin:0,fontStyle:"italic"}}>"{f.note}"</p>:<span style={{color:"#6a5e50",fontSize:11,fontFamily:"sans-serif",letterSpacing:".1em",textTransform:"uppercase"}}>+ Add note</span>}</button>)}
              </div>
              <button onClick={()=>{const n=favs.filter((_,j)=>j!==i);setFavs(n);lsSet("kl_favs",n);if(enote===i)setEnote(null)}} style={{position:"absolute",top:11,right:12,background:"none",border:"none",cursor:"pointer",color:"#e8665a",fontSize:18,opacity:.65}}>♥</button>
            </div>
          );
        })}
        {favs.length>0&&<GB go={()=>{setFavs([]);lsSet("kl_favs",[]);setEnote(null)}} style={{marginTop:8}}>Clear All</GB>}
      </div>
    </Shell>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
