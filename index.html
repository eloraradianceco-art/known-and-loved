function loadFavs() {
  try { return JSON.parse(localStorage.getItem("kl_favs") || "[]"); } catch { return []; }
}

      <div style={{ position:"fixed", inset:0, pointerEvents:"none", zIndex:0, opacity:0.45, backgroundImage:`url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E")` }} />
      <div style={{ position:"relative", zIndex:1, width:"100%", display:"flex", flexDirection:"column", alignItems:"center" }}>{children}</div>
    </div>
  );
}
const Overline = ({ children, color="#C9A84C" }) => (
  <div style={{ fontSize:11, letterSpacing:"0.3em", color, textTransform:"uppercase", marginBottom:14, fontFamily:"sans-serif", opacity:0.9 }}>{children}</div>
);
const BackBtn = ({ onClick }) => (
  <button onClick={onClick} style={{ background:"none", border:"none", color:"#9a8f82", cursor:"pointer", fontSize:11, letterSpacing:"0.15em", textTransform:"uppercase", fontFamily:"sans-serif", padding:0, marginBottom:28, display:"flex", alignItems:"center", gap:6 }}>← Back</button>
);
const PrimaryBtn = ({ onClick, children, disabled, style={} }) => (
  <button onClick={onClick} disabled={disabled} style={{ border:"none", borderRadius:4, cursor:disabled?"not-allowed":"pointer", fontFamily:"sans-serif", fontWeight:700, letterSpacing:"0.13em", textTransform:"uppercase", transition:"opacity 0.2s", padding:"15px 36px", fontSize:13, ...style }}
    onMouseOver={e=>{ if(!disabled) e.currentTarget.style.opacity="0.85"; }}
    onMouseOut={e=>{ e.currentTarget.style.opacity="1"; }}
  >{children}</button>
);
const GhostBtn = ({ onClick, children, style={} }) => (
  <button onClick={onClick} style={{ background:"none", border:"1px solid #4a3e32", borderRadius:4, color:"#a89880", padding:"13px 28px", fontSize:12, fontWeight:700, letterSpacing:"0.13em", textTransform:"uppercase", cursor:"pointer", fontFamily:"sans-serif", transition:"border-color 0.2s,color 0.2s", ...style }}
    onMouseOver={e=>{ e.currentTarget.style.borderColor="#7a6e60"; e.currentTarget.style.color="#c8b89a"; }}
    onMouseOut={e=>{ e.currentTarget.style.borderColor="#4a3e32"; e.currentTarget.style.color="#a89880"; }}
  >{children}</button>
);

/* ── App ─────────────────────────────────────────────────────────────────── */
function App() {
  const [screen, setScreen]     = useState("home");
  const [mode, setMode]         = useState("solo");
  const [names, setNames]       = useState(["",""]);
  const [levelId, setLevelId]   = useState(null);
  const [isPrayer, setIsPrayer] = useState(false);
  const [deck, setDeck]         = useState([]);
  const [idx, setIdx]           = useState(0);
  const [flipped, setFlipped]   = useState(false);
  const [prayTurn, setPrayTurn] = useState(0);
  const [turn, setTurn]         = useState(0);
  const [exiting, setExiting]   = useState(false);
  const [favs, setFavs]         = useState(() => loadFavs());
  const [editingNote, setEditingNote] = useState(null);
  const [toast, setToast]       = useState("");

  const level     = LEVELS.find(l => l.id === levelId);
  const card      = deck[idx];
  const p1        = names[0].trim() || "Person 1";
  const p2        = names[1].trim() || "Person 2";
  const cardColor = isPrayer ? PC : (level?.color || "#C9A84C");
  const cardBg    = isPrayer ? PBG : (level?.bg || "#0e0906");
  const couplesAndPrayer = mode === "couples" && isPrayer;
  const isWound   = card?.type === "wound";
  const isStyle   = card?.type === "style";

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(""), 2200); };

  const isFav    = c => c && favs.some(f => f.q === c.q);
  const toggleFav = c => {
    const next = isFav(c) ? favs.filter(f => f.q !== c.q) : [...favs, { ...c, levelId: isPrayer ? "wild" : levelId, note: "" }];
    setFavs(next); saveFavs(next);
  };
  const updateNote = (i, note) => {
    const next = favs.map((f, j) => j === i ? { ...f, note } : f);
    setFavs(next); saveFavs(next);
  };

  const startGame = (lid, prayer=false) => {
    setLevelId(lid); setIsPrayer(prayer);
    setDeck(shuffle(prayer ? CARDS.wild : CARDS[lid]));
    setIdx(0); setFlipped(false); setTurn(0); setPrayTurn(0); setScreen("game");
  };

  const nextCard = () => {
    if (idx >= deck.length - 1) { setScreen("end"); return; }
    setExiting(true);
    setTimeout(() => { setIdx(i=>i+1); setFlipped(false); setTurn(0); setPrayTurn(0); setExiting(false); }, 280);
  };

  const advance = () => {
    if (couplesAndPrayer) {
      if (!flipped) return;
      if (prayTurn < 2) { setPrayTurn(t=>t+1); return; }
      if (prayTurn === 2) { setPrayTurn(3); return; }
      nextCard();
    } else if (mode==="couples" && flipped && turn===0) {
      setTurn(1);
    } else { nextCard(); }
  };

  const canAdvance = couplesAndPrayer ? (flipped || prayTurn > 0) : flipped && (mode==="solo" || turn>=1);

  const shareFavs = () => {
    const text = favs.map((f,i) => {
      const lvl = f.levelId==="wild" ? "Wild/Prayer" : (LEVELS.find(l=>l.id===f.levelId)?.label||"");
      const extra = f.word ? `\nWord: ${f.word}` : f.style ? `\nStyle: ${f.style}` : "";
      return `${i+1}. [${lvl}]${extra}\n"${f.q}"${f.note ? `\nNote: "${f.note}"` : ""}`;
    }).join("\n\n");
    try { navigator.clipboard.writeText(`Known & Loved — Saved Cards\n${"─".repeat(28)}\n\n${text}\n\n"Two are better than one." — Ecclesiastes 4:9`); showToast("Copied ✓"); }
    catch { showToast("Copy failed — try long-pressing the text"); }
  };

  /* HOME */
  if (screen==="home") return (
    <Shell bg="#0e0906">
      <div style={{ textAlign:"center", maxWidth:420, animation:"fadeUp 0.7s ease" }}>
        <Overline>A Card Game for Christian Dating</Overline>
        <h1 style={{ fontSize:"clamp(2.8rem,8vw,4.2rem)", fontWeight:400, color:"#F5EFE4", lineHeight:1.1, margin:"0 0 10px" }}>
          Known<br /><em style={{ color:"#C9A84C" }}>&amp; Loved</em>
        </h1>
        <p style={{ fontFamily:"sans-serif", fontSize:14, lineHeight:1.85, color:"#a89880", margin:"18px 0 36px" }}>
          Six levels of conversation — from surface to soul. Designed for real connection.
        </p>
        <div style={{ display:"flex", gap:10, justifyContent:"center", flexWrap:"wrap" }}>
          <PrimaryBtn onClick={() => { setMode("solo"); setScreen("level-select"); }} style={{ background:"#C9A84C", color:"#0e0906" }}>Solo Play</PrimaryBtn>
          <PrimaryBtn onClick={() => { setMode("couples"); setScreen("setup"); }} style={{ background:"transparent", border:"1px solid #4a3e32", color:"#C9A84C" }}>Couples Mode</PrimaryBtn>
        </div>
        <button onClick={() => { setMode("solo"); startGame("wild",true); }} style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:10, margin:"14px auto 0", background:"rgba(126,184,212,0.06)", border:"1px solid rgba(126,184,212,0.18)", borderRadius:8, padding:"12px 28px", cursor:"pointer", color:PC, fontSize:12, fontFamily:"sans-serif", letterSpacing:"0.15em", textTransform:"uppercase", transition:"all 0.2s" }}
          onMouseOver={e=>e.currentTarget.style.background="rgba(126,184,212,0.12)"}
          onMouseOut={e=>e.currentTarget.style.background="rgba(126,184,212,0.06)"}
        ><span style={{ animation:"pulse 3s infinite" }}>✦</span> Prayer Mode</button>
        {favs.length>0 && (
          <button onClick={()=>setScreen("favorites")} style={{ background:"none", border:"none", color:"#9a8f82", fontSize:11, cursor:"pointer", marginTop:22, fontFamily:"sans-serif", letterSpacing:"0.15em", textTransform:"uppercase" }}>
            ♥ {favs.length} Saved {favs.length===1?"Card":"Cards"}
          </button>
        )}
        <div style={{ marginTop:52, color:"#6a5e50", fontSize:12, fontStyle:"italic" }}>"Two are better than one." — Ecclesiastes 4:9</div>
      </div>
    </Shell>
  );

  /* SETUP */
  if (screen==="setup") return (
    <Shell bg="#0e0906">
      <div style={{ maxWidth:390, width:"100%", animation:"fadeUp 0.5s ease" }}>
        <BackBtn onClick={()=>setScreen("home")} />
        <Overline>Couples Mode</Overline>
        <h2 style={{ color:"#F5EFE4", fontSize:26, fontWeight:400, margin:"0 0 8px", fontStyle:"italic" }}>Enter your names</h2>
        <p style={{ fontFamily:"sans-serif", fontSize:13, color:"#9a8f82", margin:"0 0 28px", lineHeight:1.7 }}>Optional — but it makes turns feel more personal.</p>
        {[0,1].map(i => (
          <input key={i} value={names[i]} placeholder={`Person ${i+1}`}
            onChange={e=>{ const n=[...names]; n[i]=e.target.value; setNames(n); }}
            style={{ display:"block", width:"100%", marginBottom:12, background:"rgba(255,255,255,0.04)", border:"1px solid #3a2e22", borderRadius:6, padding:"14px 18px", color:"#F5EFE4", fontSize:15, outline:"none", boxSizing:"border-box" }}
          />
        ))}
        <PrimaryBtn onClick={()=>setScreen("level-select")} style={{ background:"#C9A84C", color:"#0e0906", width:"100%", marginTop:8 }}>Continue</PrimaryBtn>
        <button onClick={()=>startGame("wild",true)} style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:10, margin:"12px auto 0", width:"100%", background:"rgba(126,184,212,0.06)", border:"1px solid rgba(126,184,212,0.18)", borderRadius:6, padding:"12px", cursor:"pointer", color:PC, fontSize:12, fontFamily:"sans-serif", letterSpacing:"0.13em", textTransform:"uppercase", boxSizing:"border-box" }}>
          <span style={{ animation:"pulse 3s infinite" }}>✦</span> Couples Prayer Mode
        </button>
      </div>
    </Shell>
  );

  /* LEVEL SELECT */
  if (screen==="level-select") return (
    <Shell bg="#0e0906">
      <div style={{ maxWidth:500, width:"100%", animation:"fadeUp 0.5s ease" }}>
        <BackBtn onClick={()=>setScreen(mode==="couples"?"setup":"home")} />
        <Overline>Choose a level</Overline>
        <h2 style={{ color:"#F5EFE4", fontSize:26, fontWeight:400, margin:"0 0 26px" }}>Where do you want to begin?</h2>
        {LEVELS.map((lvl,i) => (
          <button key={lvl.id} onClick={()=>startGame(lvl.id)} style={{ display:"flex", alignItems:"center", gap:20, width:"100%", background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:10, padding:"18px 20px", cursor:"pointer", textAlign:"left", marginBottom:8, transition:"all 0.2s", animation:`fadeUp 0.4s ease ${i*0.06}s both` }}
            onMouseOver={e=>{ e.currentTarget.style.background="rgba(255,255,255,0.07)"; e.currentTarget.style.borderColor=lvl.color+"55"; }}
            onMouseOut={e=>{ e.currentTarget.style.background="rgba(255,255,255,0.03)"; e.currentTarget.style.borderColor="rgba(255,255,255,0.08)"; }}
          >
            <div style={{ fontSize:18, color:lvl.color, fontStyle:"italic", minWidth:32, opacity:0.75 }}>{lvl.num}</div>
            <div>
              <div style={{ color:lvl.color, fontSize:10, fontWeight:700, letterSpacing:"0.15em", textTransform:"uppercase", fontFamily:"sans-serif", marginBottom:3 }}>{lvl.label} · {CARDS[lvl.id]?.length||30} cards</div>
              <div style={{ color:"#F5EFE4", fontSize:15, fontStyle:"italic", marginBottom:2 }}>{lvl.tagline}</div>
              <div style={{ color:"#9a8f82", fontSize:12, fontFamily:"sans-serif", lineHeight:1.5 }}>{lvl.desc}</div>
            </div>
          </button>
        ))}
        <button onClick={()=>startGame("wild",true)} style={{ display:"flex", alignItems:"center", gap:16, width:"100%", background:"rgba(126,184,212,0.05)", border:"1px solid rgba(126,184,212,0.18)", borderRadius:10, padding:"18px 20px", cursor:"pointer", textAlign:"left", marginTop:4, transition:"all 0.2s" }}
          onMouseOver={e=>e.currentTarget.style.background="rgba(126,184,212,0.1)"}
          onMouseOut={e=>e.currentTarget.style.background="rgba(126,184,212,0.05)"}
        >
          <div style={{ fontSize:18, color:PC, minWidth:32, opacity:0.75, animation:"pulse 3s infinite" }}>✦</div>
          <div>
            <div style={{ color:PC, fontSize:10, fontWeight:700, letterSpacing:"0.15em", textTransform:"uppercase", fontFamily:"sans-serif", marginBottom:3 }}>{mode==="couples"?"Couples ":""}Prayer Mode · 30 cards</div>
            <div style={{ color:"#F5EFE4", fontSize:15, fontStyle:"italic", marginBottom:2 }}>Pray together. Linger here.</div>
            <div style={{ color:"#9a8f82", fontSize:12, fontFamily:"sans-serif", lineHeight:1.5 }}>{mode==="couples"?"Each card becomes a prompt to pray aloud — one person then the other.":"Scripture, testimony, and cards designed to turn into prayer."}</div>
          </div>
        </button>
      </div>
    </Shell>
  );

  /* GAME */
  if (screen==="game" && card) {
    const showPrayOverlay = couplesAndPrayer && prayTurn>=1 && prayTurn<=2;
    const prayingPerson   = prayTurn===1 ? p1 : p2;
    return (
      <Shell bg={cardBg}>
        <div style={{ maxWidth:440, width:"100%", display:"flex", flexDirection:"column", alignItems:"center" }}>
          {/* Top bar */}
          <div style={{ width:"100%", display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:22 }}>
            <button onClick={()=>setScreen("level-select")} style={{ background:"none", border:"none", color:"#9a8f82", cursor:"pointer", fontSize:11, letterSpacing:"0.15em", textTransform:"uppercase", fontFamily:"sans-serif", padding:0 }}>← Levels</button>
            <div style={{ color:"#7a6e60", fontSize:11, letterSpacing:"0.15em", fontFamily:"sans-serif" }}>{idx+1} / {deck.length}</div>
            <div style={{ fontSize:11, color:cardColor, letterSpacing:"0.15em", textTransform:"uppercase", fontFamily:"sans-serif", opacity:0.9 }}>
              {isPrayer?(mode==="couples"?"Couples Prayer":"Prayer Mode"):level?.label}
            </div>
          </div>
          {/* Progress */}
          <div style={{ width:"100%", height:2, background:"rgba(255,255,255,0.06)", borderRadius:2, marginBottom:28 }}>
            <div style={{ height:"100%", borderRadius:2, background:cardColor, width:`${((idx+1)/deck.length)*100}%`, transition:"width 0.4s ease" }} />
          </div>
          {/* Couples turn badge */}
          {mode==="couples" && !isPrayer && flipped && (
            <div style={{ background:`${cardColor}18`, border:`1px solid ${cardColor}33`, borderRadius:20, padding:"6px 18px", marginBottom:16, fontSize:11, color:cardColor, letterSpacing:"0.12em", fontFamily:"sans-serif", fontWeight:700, textTransform:"uppercase", animation:"fadeUp 0.3s ease" }}>
              {turn===0?`${p1}'s turn`:`${p2}'s turn`}
            </div>
          )}
          {/* Prayer ambient */}
          {isPrayer && <div style={{ position:"fixed", top:"40%", left:"50%", transform:"translate(-50%,-50%)", width:400, height:400, borderRadius:"50%", background:`radial-gradient(circle,${PC}0c 0%,transparent 70%)`, pointerEvents:"none", animation:"pulse 4s infinite" }} />}
          {/* Prayer overlay */}
          {showPrayOverlay && (
            <div style={{ position:"fixed", inset:0, zIndex:20, background:"rgba(7,12,16,0.93)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:32, animation:"fadeIn 0.4s ease" }}>
              <div style={{ position:"relative", width:90, height:90, marginBottom:32 }}>
                {[0,1,2].map(i=><div key={i} style={{ position:"absolute", inset:0, border:`1px solid ${PC}`, borderRadius:"50%", animation:`ripple 2.4s ease-out ${i*0.8}s infinite`, opacity:0 }} />)}
                <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:28, color:PC, animation:"breathe 3s ease-in-out infinite" }}>✦</div>
              </div>
              <div style={{ fontSize:11, color:PC, letterSpacing:"0.25em", textTransform:"uppercase", fontFamily:"sans-serif", marginBottom:14, opacity:0.7 }}>Praying aloud</div>
              <div style={{ fontSize:"clamp(1.5rem,6vw,2rem)", color:"#F5EFE4", fontStyle:"italic", marginBottom:12, textAlign:"center" }}>{prayingPerson}</div>
              <p style={{ color:"#9a8f82", fontSize:13, fontFamily:"sans-serif", lineHeight:1.75, textAlign:"center", maxWidth:300, margin:"0 0 40px" }}>
                {prayTurn===1?`${p1}, take a moment to pray aloud — for yourself, for ${p2}, or for both of you.`:`${p2}, take a moment to pray aloud — whatever the Spirit puts on your heart.`}
              </p>
              <button onClick={advance} style={{ background:PC, color:"#0e0906", border:"none", borderRadius:4, padding:"14px 40px", fontSize:13, fontWeight:700, letterSpacing:"0.15em", textTransform:"uppercase", cursor:"pointer", fontFamily:"sans-serif" }}>
                Amen {prayTurn===1?`· ${p2}'s Turn →`:"· Next Card →"}
              </button>
            </div>
          )}
          {/* Card */}
          <div onClick={()=>!flipped&&setFlipped(true)} style={{ width:"100%", minHeight:(isWound||isStyle)&&flipped?340:300, background:flipped?`linear-gradient(150deg,${cardBg} 0%,#181208 100%)`:"linear-gradient(150deg,#1e1710 0%,#141008 100%)", border:`1px solid ${flipped?cardColor+"40":"rgba(255,255,255,0.08)"}`, borderRadius:16, padding:"36px 30px", cursor:flipped?"default":"pointer", display:"flex", flexDirection:"column", justifyContent:"center", alignItems:"center", textAlign:"center", boxShadow:flipped?`0 0 80px ${cardColor}12,0 24px 60px rgba(0,0,0,0.6)`:"0 20px 50px rgba(0,0,0,0.5)", transition:"all 0.45s ease", transform:exiting?"translateX(-20px)":"translateX(0)", opacity:exiting?0:1, position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", top:15, left:18, fontSize:9, color:cardColor, opacity:0.4, letterSpacing:"0.2em", fontFamily:"sans-serif", textTransform:"uppercase" }}>
              {isPrayer?"Prayer":isWound&&flipped?"Wound Word":isStyle&&flipped?"Attachment Style":level?.label}
            </div>
            {flipped && (
              <button onClick={e=>{ e.stopPropagation(); toggleFav(card); }} style={{ position:"absolute", top:10, right:14, background:"none", border:"none", cursor:"pointer", fontSize:20, color:isFav(card)?"#e8665a":"#7a6e60", transition:"color 0.2s,transform 0.15s", transform:isFav(card)?"scale(1.15)":"scale(1)" }}>♥</button>
            )}
            {!flipped ? (
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:14 }}>
                <div style={{ fontSize:28, opacity:0.2, color:cardColor, animation:isPrayer?"pulse 3s infinite":"none" }}>✦</div>
                <div style={{ color:"#9a8f82", fontSize:11, letterSpacing:"0.2em", textTransform:"uppercase", fontFamily:"sans-serif" }}>Tap to reveal</div>
              </div>
            ) : isWound ? (
              <div style={{ animation:"fadeUp 0.35s ease", width:"100%" }}>
                <div style={{ fontSize:"clamp(1.6rem,5vw,2rem)", color:cardColor, fontWeight:400, marginBottom:10 }}>{card.word}</div>
                <div style={{ color:"#9a8f82", fontSize:12, fontFamily:"sans-serif", lineHeight:1.6, marginBottom:20, fontStyle:"italic", opacity:0.85 }}>{card.def}</div>
                <div style={{ height:1, background:`${cardColor}25`, marginBottom:20 }} />
                <p style={{ color:"#F5EFE4", fontSize:"clamp(1rem,3vw,1.15rem)", lineHeight:1.72, margin:0, fontStyle:"italic" }}>{card.q}</p>
                {card.v && <p style={{ color:cardColor, fontSize:11, marginTop:20, opacity:0.65, fontFamily:"sans-serif", lineHeight:1.6 }}>{card.v}</p>}
              </div>
            ) : isStyle ? (
              <div style={{ animation:"fadeUp 0.35s ease", width:"100%" }}>
                <div style={{ display:"flex", alignItems:"center", gap:10, justifyContent:"center", marginBottom:12 }}>
                  <span style={{ background:`${STYLE_COLORS[card.style]}22`, border:`1px solid ${STYLE_COLORS[card.style]}55`, borderRadius:20, padding:"4px 14px", fontSize:12, color:STYLE_COLORS[card.style], fontFamily:"sans-serif", fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase" }}>{card.style}</span>
                </div>
                <div style={{ color:"#9a8f82", fontSize:12, fontFamily:"sans-serif", lineHeight:1.65, marginBottom:20, fontStyle:"italic", opacity:0.9, textAlign:"center" }}>{card.desc}</div>
                <div style={{ height:1, background:`${STYLE_COLORS[card.style]}25`, marginBottom:20 }} />
                <p style={{ color:"#F5EFE4", fontSize:"clamp(1rem,3vw,1.15rem)", lineHeight:1.72, margin:0, fontStyle:"italic" }}>{card.q}</p>
                {card.v && <p style={{ color:STYLE_COLORS[card.style], fontSize:11, marginTop:20, opacity:0.65, fontFamily:"sans-serif", lineHeight:1.6 }}>{card.v}</p>}
              </div>
            ) : (
              <div style={{ animation:"fadeUp 0.35s ease" }}>
                <p style={{ color:"#F5EFE4", fontSize:"clamp(1.05rem,3.2vw,1.22rem)", lineHeight:1.72, margin:0, fontStyle:"italic" }}>{card.q}</p>
                {card.v && <p style={{ color:cardColor, fontSize:11, marginTop:24, opacity:0.7, fontFamily:"sans-serif", lineHeight:1.6 }}>{card.v}</p>}
              </div>
            )}
          </div>
          {/* Actions */}
          {!showPrayOverlay && (
            <>
              <PrimaryBtn onClick={advance} disabled={!canAdvance} style={{ marginTop:22, background:canAdvance?cardColor:"transparent", color:canAdvance?"#0e0906":"#6a5e50", border:`1px solid ${canAdvance?cardColor:"#4a3e32"}`, fontSize:12 }}>
                {couplesAndPrayer&&flipped&&prayTurn===0?"Begin Praying →":mode==="couples"&&!isPrayer&&flipped&&turn===0?`${p2}'s Turn →`:idx>=deck.length-1?"Finish":"Next Card"}
              </PrimaryBtn>
              <button onClick={nextCard} style={{ background:"none", border:"none", color:"#7a6e60", fontSize:10, cursor:"pointer", marginTop:12, fontFamily:"sans-serif", letterSpacing:"0.12em", textTransform:"uppercase" }}>Skip</button>
            </>
          )}
        </div>
      </Shell>
    );
  }

  /* END */
  if (screen==="end") return (
    <Shell bg="#0e0906">
      <div style={{ textAlign:"center", maxWidth:380, animation:"fadeUp 0.6s ease" }}>
        <div style={{ fontSize:30, marginBottom:20, opacity:0.45, color:"#C9A84C", animation:"pulse 3s infinite" }}>✦</div>
        <h2 style={{ color:"#F5EFE4", fontSize:30, fontWeight:400, margin:"0 0 14px", fontStyle:"italic" }}>Well done.</h2>
        <p style={{ fontFamily:"sans-serif", fontSize:14, color:"#a89880", lineHeight:1.85, margin:"0 0 32px" }}>You showed up with honesty.<br />That's not nothing — it's actually everything.</p>
        <div style={{ color:"#C9A84C", fontSize:12, opacity:0.75, marginBottom:36, fontStyle:"italic", lineHeight:1.9 }}>
          "Love is patient, love is kind…<br />it always hopes, always perseveres."
          <div style={{ fontSize:10, opacity:0.65, fontStyle:"normal", letterSpacing:"0.1em", fontFamily:"sans-serif", marginTop:6 }}>— 1 Corinthians 13</div>
        </div>
        <div style={{ display:"flex", gap:10, justifyContent:"center", flexWrap:"wrap", marginBottom:10 }}>
          <PrimaryBtn onClick={()=>startGame(levelId,isPrayer)} style={{ background:"#C9A84C", color:"#0e0906", padding:"13px 28px", fontSize:12 }}>Play Again</PrimaryBtn>
          <GhostBtn onClick={()=>setScreen("level-select")}>New Level</GhostBtn>
          {favs.length>0 && <GhostBtn onClick={()=>setScreen("favorites")}>♥ Saved ({favs.length})</GhostBtn>}
        </div>
        <GhostBtn onClick={()=>{ setScreen("home"); setMode("solo"); }} style={{ width:"100%", boxSizing:"border-box", marginTop:4 }}>Home</GhostBtn>
      </div>
    </Shell>
  );

  /* FAVORITES */
  if (screen==="favorites") return (
    <Shell bg="#0e0906">
      {toast && <div style={{ position:"fixed", top:24, left:"50%", transform:"translateX(-50%)", background:"#2a2018", border:"1px solid #4a3e32", borderRadius:20, padding:"10px 22px", color:"#c8b89a", fontSize:12, fontFamily:"sans-serif", letterSpacing:"0.1em", zIndex:50, animation:"fadeUp 0.3s ease", whiteSpace:"nowrap" }}>{toast}</div>}
      <div style={{ maxWidth:520, width:"100%", animation:"fadeUp 0.5s ease" }}>
        <BackBtn onClick={()=>setScreen("home")} />
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:24 }}>
          <div>
            <Overline color="#e8665a">Saved Cards</Overline>
            <h2 style={{ color:"#F5EFE4", fontSize:26, fontWeight:400, margin:0, fontStyle:"italic" }}>
              {favs.length===0?"Nothing saved yet.":`${favs.length} card${favs.length>1?"s":""} saved`}
            </h2>
          </div>
          {favs.length>0 && (
            <button onClick={shareFavs} style={{ background:"rgba(201,168,76,0.08)", border:"1px solid rgba(201,168,76,0.3)", borderRadius:6, padding:"10px 18px", color:"#C9A84C", fontSize:11, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", cursor:"pointer", fontFamily:"sans-serif", whiteSpace:"nowrap", marginTop:14, flexShrink:0 }}>↑ Copy All</button>
          )}
        </div>
        {favs.length===0 && <p style={{ fontFamily:"sans-serif", fontSize:14, color:"#9a8f82", lineHeight:1.7 }}>Tap ♥ on any revealed card during play to save it here.</p>}
        {favs.map((f,i) => {
          const lvl = f.levelId==="wild"?null:LEVELS.find(l=>l.id===f.levelId);
          const col = lvl?lvl.color:PC;
          const isEditing = editingNote===i;
          return (
            <div key={i} style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:10, padding:"20px 22px", marginBottom:12, position:"relative", animation:`fadeUp 0.3s ease ${i*0.04}s both` }}>
              <div style={{ fontSize:10, color:col, letterSpacing:"0.15em", textTransform:"uppercase", fontFamily:"sans-serif", marginBottom:8 }}>
                {lvl?lvl.label:"Wild / Prayer"}{f.word?" · Wound Word":""}{f.style?" · Attachment Style":""}
              </div>
              {f.word && <div style={{ fontSize:16, color:col, marginBottom:6 }}>{f.word}</div>}
              {f.style && <span style={{ background:`${STYLE_COLORS[f.style]}22`, border:`1px solid ${STYLE_COLORS[f.style]}55`, borderRadius:20, padding:"3px 12px", fontSize:11, color:STYLE_COLORS[f.style], fontFamily:"sans-serif", fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase", display:"inline-block", marginBottom:10 }}>{f.style}</span>}
              <p style={{ color:"#ede5d8", fontSize:14, lineHeight:1.72, margin:0, fontStyle:"italic", paddingRight:32 }}>{f.q}</p>
              {f.v && <p style={{ color:col, fontSize:11, marginTop:10, opacity:0.6, fontFamily:"sans-serif", lineHeight:1.5 }}>{f.v}</p>}
              <div style={{ marginTop:14, borderTop:"1px solid rgba(255,255,255,0.05)", paddingTop:12 }}>
                {isEditing ? (
                  <div>
                    <textarea value={f.note||""} onChange={e=>updateNote(i,e.target.value)} placeholder="Add a note, reflection, or what came up…" rows={3} style={{ width:"100%", background:"rgba(255,255,255,0.05)", border:"1px solid #4a3e32", borderRadius:6, padding:"10px 12px", color:"#e0d8cc", fontSize:13, fontFamily:"sans-serif", lineHeight:1.6, outline:"none", boxSizing:"border-box" }} autoFocus />
                    <button onClick={()=>setEditingNote(null)} style={{ background:"none", border:"none", color:"#9a8f82", fontSize:11, cursor:"pointer", marginTop:6, fontFamily:"sans-serif", letterSpacing:"0.1em", textTransform:"uppercase" }}>Done</button>
                  </div>
                ) : (
                  <button onClick={()=>setEditingNote(i)} style={{ background:"none", border:"none", padding:0, cursor:"pointer", textAlign:"left", width:"100%" }}>
                    {f.note ? <p style={{ color:"#9a8f82", fontSize:13, fontFamily:"sans-serif", lineHeight:1.65, margin:0, fontStyle:"italic" }}>"{f.note}"</p> : <span style={{ color:"#6a5e50", fontSize:11, fontFamily:"sans-serif", letterSpacing:"0.1em", textTransform:"uppercase" }}>+ Add note</span>}
                  </button>
                )}
              </div>
              <button onClick={()=>{ const next=favs.filter((_,j)=>j!==i); setFavs(next); saveFavs(next); if(editingNote===i)setEditingNote(null); }} style={{ position:"absolute", top:12, right:14, background:"none", border:"none", cursor:"pointer", color:"#e8665a", fontSize:18, opacity:0.65 }}>♥</button>
            </div>
          );
        })}
        {favs.length>0 && <GhostBtn onClick={()=>{ setFavs([]); saveFavs([]); setEditingNote(null); }} style={{ marginTop:8 }}>Clear All</GhostBtn>}
      </div>
    </Shell>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
